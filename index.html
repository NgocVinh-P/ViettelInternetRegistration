<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        var originalFetch = window.fetch;
        var customFetch = originalFetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return customFetch; },
            set: function(val) { customFetch = val; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          try {
            Object.defineProperty(globalThis, 'fetch', {
              get: function() { return customFetch; },
              set: function(val) { customFetch = val; },
              configurable: true,
              enumerable: true
            });
          } catch (err) {
            console.warn("Failed to patch fetch property:", err);
          }
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viettel Internet - Đăng ký Lắp đặt FTTH Cáp quang Tốc độ cao 2026</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
